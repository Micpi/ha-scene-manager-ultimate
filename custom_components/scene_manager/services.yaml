save_scene:
  name: Sauvegarder une scene
  description: Cree ou met a jour une scene et sauvegarde ses metadonnees.
  fields:
    scene_id:
      name: ID de scene
      description: Identifiant de la scene, par exemple salon_film.
      required: true
      selector:
        text: {}
    entities:
      name: Entites
      description: Entites a capturer dans la scene, ou objet d'etats prepare par la carte.
      required: true
      selector:
        entity:
          multiple: true
    snapshot:
      name: Instantane
      description: Etats optionnels a sauvegarder sans modifier les entites en live.
      selector:
        object: {}
    icon:
      name: Icone
      description: Icone MDI affichee par la carte.
      default: mdi:palette
      selector:
        icon: {}
    color:
      name: Couleur
      description: Couleur hexadecimale du bouton, par exemple "#03A9F4".
      default: "#9E9E9E"
      selector:
        text: {}
    room:
      name: Piece
      description: Piece ou zone utilisee pour filtrer et ordonner les scenes.
      default: unknown
      selector:
        text: {}
    order_key:
      name: Cle d'ordre
      description: Cle de tri optionnelle pour isoler plusieurs jeux de scenes dans une meme piece.
      selector:
        text: {}
    replace_entity_id:
      name: Scene remplacee
      description: Ancienne scene a supprimer lors d'un renommage.
      selector:
        entity:
          domain: scene
    order:
      name: Ordre
      description: Liste ordonnee optionnelle a sauvegarder en meme temps que la scene.
      selector:
        object: {}

delete_scene:
  name: Supprimer une scene
  description: Supprime une scene et ses metadonnees.
  fields:
    entity_id:
      name: Scene
      description: Entite scene a supprimer.
      required: true
      selector:
        entity:
          domain: scene

reorder_scenes:
  name: Reordonner les scenes
  description: Met a jour l'ordre d'affichage des scenes pour une piece.
  fields:
    room:
      name: Piece
      description: Piece ou zone concernee.
      required: true
      selector:
        text: {}
    order_key:
      name: Cle d'ordre
      description: Cle de tri optionnelle. Si absente, la piece est utilisee.
      selector:
        text: {}
    order:
      name: Ordre
      description: Liste ordonnee des entites scene.
      required: true
      selector:
        object: {}

activate_scene:
  name: Activer une scene
  description: Declenche une scene sauvegardee et memorise l'action dans les capteurs Scene Manager.
  fields:
    entity_id:
      name: Scene
      description: Entite scene a declencher.
      required: true
      selector:
        entity:
          domain: scene
    transition:
      name: Transition
      description: Duree de transition optionnelle en secondes.
      selector:
        number:
          min: 0
          max: 120
          mode: box
    source:
      name: Source
      description: Origine de l'action, par exemple card, button ou automation.
      default: service
      selector:
        text: {}

set_live_mode:
  name: Definir le mode live
  description: Active ou desactive la modification live des scenes.
  fields:
    enabled:
      name: Active
      description: Etat du mode live a memoriser.
      required: true
      selector:
        boolean: {}
